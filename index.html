<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tabungan Keluarga</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen p-2 md:p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white rounded-xl shadow-md p-6">
            <h1 class="text-2xl font-bold text-blue-600 mb-4 text-center">💰 Input Tabungan Keluarga</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold">Siapa yang Mengisi?</label>
                    <select id="user-input" class="w-full border p-2 rounded bg-yellow-50 font-bold">
                        <option value="AYAH">AYAH</option>
                        <option value="BUNDA">BUNDA</option>
                        <option value="AA GIBRAN">AA GIBRAN</option>
                        <option value="KAKAK FIYA">KAKAK FIYA</option>
                        <option value="ABANG RAYSHAKA">ABANG RAYSHAKA</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold">Keterangan</label>
                    <input type="text" id="desc" class="w-full border p-2 rounded" placeholder="Contoh: Beli Buku">
                </div>
                <div>
                    <label class="block text-sm font-semibold">Jumlah (Rp)</label>
                    <input type="number" id="amount" class="w-full border p-2 rounded" placeholder="50000">
                </div>
                <div>
                    <label class="block text-sm font-semibold">Tanggal</label>
                    <input type="date" id="date" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-semibold">Tipe</label>
                    <select id="type" class="w-full border p-2 rounded">
                        <option value="in">MASUK (+)</option>
                        <option value="out">KELUAR (-)</option>
                    </select>
                </div>
            </div>
            <button onclick="saveData()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md">SIMPAN TRANSAKSI</button>
        </div>

        <div class="bg-slate-800 rounded-xl shadow-lg p-6 text-white">
            <h2 class="text-xl font-bold mb-4 flex items-center">📊 Dashboard Laporan Ayah</h2>
            
            <div class="flex flex-wrap gap-4 mb-6 items-end">
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-xs uppercase mb-1 text-slate-400">Pilih Bulan Laporan:</label>
                    <select id="filter-month" onchange="loadMonthlyReport()" class="w-full p-2 rounded bg-slate-700 text-white border-none">
                        <option value="01">Januari</option>
                        <option value="02">Februari</option>
                        <option value="03">Maret</option>
                        <option value="04">April</option>
                        <option value="05">Mei</option>
                        <option value="06">Juni</option>
                        <option value="07">Juli</option>
                        <option value="08">Agustus</option>
                        <option value="09">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                    </select>
                </div>
                <div class="bg-green-900/40 p-3 rounded-lg flex-1 text-center border border-green-700">
                    <p class="text-[10px] uppercase">Total Masuk</p>
                    <p id="total-in" class="text-lg font-bold text-green-400 text-nowrap">Rp 0</p>
                </div>
                <div class="bg-red-900/40 p-3 rounded-lg flex-1 text-center border border-red-700">
                    <p class="text-[10px] uppercase">Total Keluar</p>
                    <p id="total-out" class="text-lg font-bold text-red-400 text-nowrap">Rp 0</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs uppercase bg-slate-700 text-slate-300">
                        <tr>
                            <th class="p-2">Tgl</th>
                            <th class="p-2">Nama</th>
                            <th class="p-2">Ket</th>
                            <th class="p-2 text-right">Jumlah</th>
                            <th class="p-2 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="report-body" class="text-slate-200">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDpkVNmfyqx76jfZV0T9N0pye4Q0p9G2lk",
            authDomain: "tabungankeluarga-a091f.firebaseapp.com",
            projectId: "tabungankeluarga-a091f",
            storageBucket: "tabungankeluarga-a091f.firebasestorage.app",
            messagingSenderId: "589724329490",
            appId: "1:589724329490:web:f12cff7a53d9fbe64a1acb",
            measurementId: "G-HL3VLW3CPE",
            databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Set tanggal otomatis & Filter bulan ke hari ini
        const today = new Date();
        document.getElementById('date').valueAsDate = today;
        const currentMonth = String(today.getMonth() + 1).padStart(2, '0');
        document.getElementById('filter-month').value = currentMonth;

        function saveData() {
            const user = document.getElementById('user-input').value;
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;

            if (desc && amount && date) {
                db.ref('transaksi').push({
                    penginput: user,
                    keterangan: desc,
                    jumlah: parseInt(amount),
                    tipe: type,
                    tanggal: date,
                    waktu: Date.now()
                });
                document.getElementById('desc').value = "";
                document.getElementById('amount').value = "";
                alert("Data berhasil disimpan!");
            } else {
                alert("Mohon isi semua data!");
            }
        }

        function deleteData(id) {
            if (confirm("Hapus data ini?")) {
                db.ref('transaksi/' + id).remove();
            }
        }

        function loadMonthlyReport() {
            const selectedMonth = document.getElementById('filter-month').value;
            
            db.ref('transaksi').on('value', (snapshot) => {
                const reportBody = document.getElementById('report-body');
                const totalInElem = document.getElementById('total-in');
                const totalOutElem = document.getElementById('total-out');
                
                reportBody.innerHTML = "";
                let totalIn = 0;
                let totalOut = 0;
                let dataArray = [];

                snapshot.forEach((childSnapshot) => {
                    const item = childSnapshot.val();
                    const itemMonth = item.tanggal.split('-')[1]; // Ambil MM dari YYYY-MM-DD

                    if (itemMonth === selectedMonth) {
                        dataArray.push({ id: childSnapshot.key, ...item });
                        if (item.tipe === 'in') totalIn += item.jumlah;
                        else totalOut += item.jumlah;
                    }
                });

                totalInElem.innerText = "Rp " + totalIn.toLocaleString();
                totalOutElem.innerText = "Rp " + totalOut.toLocaleString();

                dataArray.reverse().forEach((item) => {
                    const color = item.tipe === 'in' ? 'text-green-400' : 'text-red-400';
                    const row = `
                        <tr class="border-b border-slate-700 hover:bg-slate-700/50">
                            <td class="p-2 text-[10px]">${item.tanggal}</td>
                            <td class="p-2 font-bold text-blue-300 text-xs">${item.penginput}</td>
                            <td class="p-2 text-xs">${item.keterangan}</td>
                            <td class="p-2 font-bold ${color} text-right">Rp ${item.jumlah.toLocaleString()}</td>
                            <td class="p-2 text-center">
                                <button onclick="deleteData('${item.id}')" class="text-red-400 hover:text-red-200">✕</button>
                            </td>
                        </tr>
                    `;
                    reportBody.innerHTML += row;
                });
            });
        }

        // Jalankan laporan saat pertama kali buka
        loadMonthlyReport();
    </script>
</body>
</html>
