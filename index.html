<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Cash - Realtime Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
            <h1 class="text-3xl font-black text-blue-600 text-center mb-8 italic">FAMILY CASH</h1>
            <div class="space-y-4">
                <select id="user-select" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <option value="AYAH">AYAH</option>
                    <option value="BUNDA">BUNDA</option>
                    <option value="AA GIBRAN">AA GIBRAN</option>
                    <option value="KAKAK FIYA">KAKAK FIYA</option>
                    <option value="ABANG RAYSHAKA">ABANG RAYSHAKA</option>
                </select>
                <input type="password" id="pass-input" placeholder="Password (nama kecil)" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg">MASUK</button>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="hidden max-w-4xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-blue-700 uppercase" id="display-name">USER</h2>
            <button onclick="logout()" class="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg">Keluar</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 mb-8">
            <h3 class="font-black text-gray-400 text-xs uppercase mb-4 tracking-widest text-center">Peringkat Tabungan Keluarga</h3>
            <div id="leaderboard" class="space-y-3">
                </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="bg-blue-600 p-4 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-bold opacity-70">Saldo Saya</p>
                <h3 id="my-saldo" class="text-xl font-bold">Rp 0</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100">
                <p class="text-[10px] text-gray-400 uppercase font-bold">Total Pengeluaran</p>
                <h3 id="my-expense" class="text-xl font-bold text-red-500">Rp 0</h3>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="desc" placeholder="Keterangan" class="flex-grow border p-3 rounded-xl outline-none bg-gray-50">
                <input type="number" id="amount" placeholder="Jumlah (Rp)" class="flex-grow border p-3 rounded-xl outline-none bg-gray-50">
                <select id="type" class="border p-3 rounded-xl outline-none bg-gray-50 font-bold">
                    <option value="in">MASUK (+)</option>
                    <option value="out">KELUAR (-)</option>
                </select>
                <button onclick="saveData()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-600 transition">SIMPAN</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            // TEMPEL KODE FIREBASE CONFIG KAMU DI SINI
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        const userList = ["AYAH", "BUNDA", "AA GIBRAN", "KAKAK FIYA", "ABANG RAYSHAKA"];

        function login() {
            const user = document.getElementById('user-select').value;
            const pass = document.getElementById('pass-input').value.toLowerCase();
            const validPass = { "AYAH":"ayah", "BUNDA":"bunda", "AA GIBRAN":"gibran", "KAKAK FIYA":"fiya", "ABANG RAYSHAKA":"rayshaka" };

            if (validPass[user] === pass) {
                currentUser = user;
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('display-name').innerText = currentUser;
                loadData();
            } else {
                alert("Password salah!");
            }
        }

        function saveData() {
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);
            const type = document.getElementById('type').value;

            if (!desc || !amount) return alert("Isi semua data!");

            const transRef = db.ref('transactions/' + currentUser).push();
            transRef.set({ desc, amount, type, time: Date.now() });

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
        }

        function loadData() {
            // Listen semua data keluarga untuk Leaderboard
            db.ref('transactions').on('value', (snapshot) => {
                const allData = snapshot.val() || {};
                let userTotals = [];

                userList.forEach(name => {
                    let total = 0;
                    let myOut = 0;
                    const userTrans = allData[name] || {};
                    
                    Object.values(userTrans).forEach(t => {
                        if (t.type === 'in') total += t.amount;
                        else { total -= t.amount; if(name === currentUser) myOut += t.amount; }
                    });

                    userTotals.push({ name, total });
                    if (name === currentUser) {
                        document.getElementById('my-saldo').innerText = "Rp " + total.toLocaleString();
                        document.getElementById('my-expense').innerText = "Rp " + myOut.toLocaleString();
                    }
                });

                // Urutkan dari terbesar ke terkecil
                userTotals.sort((a, b) => b.total - a.total);

                const lbElement = document.getElementById('leaderboard');
                lbElement.innerHTML = '';
                userTotals.forEach((item, index) => {
                    const color = index === 0 ? 'bg-yellow-50 border-yellow-200' : 'bg-gray-50 border-gray-100';
                    const icon = index === 0 ? '👑' : index + 1;
                    lbElement.innerHTML += `
                        <div class="flex justify-between items-center p-3 rounded-xl border ${color}">
                            <div class="flex items-center gap-3 font-bold text-sm">
                                <span class="w-6">${icon}</span>
                                <span>${item.name}</span>
                            </div>
                            <span class="font-black text-blue-600">Rp ${item.total.toLocaleString()}</span>
                        </div>
                    `;
                });
            });
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
