<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Keluarga</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen p-2 md:p-4 font-sans">

    <div id="login-page" class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8 mt-10">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 text-center">🔐 Login Keluarga</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Pilih Anggota Keluarga:</label>
                <select id="user-login" class="w-full border p-3 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="AYAH">AYAH</option>
                    <option value="BUNDA">BUNDA</option>
                    <option value="AA GIBRAN">AA GIBRAN</option>
                    <option value="KAKAK FIYA">KAKAK FIYA</option>
                    <option value="ABANG RAYSHAKA">ABANG RAYSHAKA</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Password:</label>
                <input type="password" id="pass-login" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan password">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">MASUK</button>
        </div>
    </div>

    <div id="main-page" class="max-w-4xl mx-auto space-y-6 hidden">
        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm">
            <span class="font-bold text-blue-600 text-lg">Halo, <span id="display-user"></span>!</span>
            <button onclick="logout()" class="text-red-500 text-sm font-semibold border border-red-500 px-3 py-1 rounded-lg hover:bg-red-50">Logout</button>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-500">
            <h2 class="text-xl font-bold mb-4 text-gray-800">📝 Catat Transaksi</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-gray-500">Keterangan</label>
                    <input type="text" id="desc" class="w-full border-b-2 p-2 focus:border-blue-500 outline-none" placeholder="Misal: Uang jajan sekolah">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">Jumlah (Rp)</label>
                    <input type="number" id="amount" class="w-full border-b-2 p-2 focus:border-blue-500 outline-none" placeholder="0">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">Tanggal</label>
                    <input type="date" id="date" class="w-full border-b-2 p-2 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500">Tipe</label>
                    <select id="type" class="w-full border-b-2 p-2 focus:border-blue-500 outline-none">
                        <option value="in">UANG MASUK (+)</option>
                        <option value="out">UANG KELUAR (-)</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="saveData()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md">SIMPAN</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl shadow-xl p-6 text-white overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-xl font-bold text-blue-400">📊 Laporan Bulanan</h2>
                <select id="filter-month" onchange="loadReport()" class="bg-slate-800 text-white border border-slate-700 p-2 rounded-lg outline-none">
                    <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                    <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                    <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                    <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-green-500">
                    <p class="text-xs text-slate-400 uppercase">Total Masuk</p>
                    <p id="total-in" class="text-lg font-bold text-green-400">Rp 0</p>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-red-500">
                    <p class="text-xs text-slate-400 uppercase">Total Keluar</p>
                    <p id="total-out" class="text-lg font-bold text-red-400">Rp 0</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-500 uppercase bg-slate-800">
                        <tr>
                            <th class="p-3">Tgl</th>
                            <th class="p-3">Nama</th>
                            <th class="p-3">Ket</th>
                            <th class="p-3 text-right">Jumlah</th>
                            <th class="p-3 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="report-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDpkVNmfyqx76jfZV0T9N0pye4Q0p9G2lk",
            authDomain: "tabungankeluarga-a091f.firebaseapp.com",
            projectId: "tabungankeluarga-a091f",
            storageBucket: "tabungankeluarga-a091f.firebasestorage.app",
            messagingSenderId: "589724329490",
            appId: "1:589724329490:web:f12cff7a53d9fbe64a1acb",
            measurementId: "G-HL3VLW3CPE",
            databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        const userPasswords = {
            "AYAH": "ayah",
            "BUNDA": "bunda",
            "AA GIBRAN": "gibran",
            "KAKAK FIYA": "fiya",
            "ABANG RAYSHAKA": "shaka"
        };

        function login() {
            const user = document.getElementById('user-login').value;
            const pass = document.getElementById('pass-login').value;

            if (userPasswords[user] === pass) {
                currentUser = user;
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                document.getElementById('display-user').innerText = currentUser;
                document.getElementById('date').valueAsDate = new Date();
                const currentMonth = String(new Date().getMonth() + 1).padStart(2, '0');
                document.getElementById('filter-month').value = currentMonth;
                loadReport();
            } else {
                alert("Password salah!");
            }
        }

        function logout() {
            location.reload();
        }

        function saveData() {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;

            if (desc && amount && date) {
                db.ref('transaksi').push({
                    penginput: currentUser,
                    keterangan: desc,
                    jumlah: parseInt(amount),
                    tipe: type,
                    tanggal: date,
                    waktu: Date.now()
                });
                document.getElementById('desc').value = "";
                document.getElementById('amount').value = "";
                alert("Berhasil disimpan!");
            } else {
                alert("Lengkapi data!");
            }
        }

        function deleteData(id, penginput) {
            // Hanya penginput atau AYAH yang bisa hapus
            if (currentUser === "AYAH" || currentUser === penginput) {
                if (confirm("Hapus data ini?")) {
                    db.ref('transaksi/' + id).remove();
                }
            } else {
                alert("Hanya Ayah atau penginput data ini yang boleh menghapus!");
            }
        }

        function loadReport() {
            const selectedMonth = document.getElementById('filter-month').value;
            
            db.ref('transaksi').on('value', (snapshot) => {
                const reportBody = document.getElementById('report-body');
                const totalInElem = document.getElementById('total-in');
                const totalOutElem = document.getElementById('total-out');
                
                reportBody.innerHTML = "";
                let totalIn = 0; let totalOut = 0;
                let dataArray = [];

                snapshot.forEach((childSnapshot) => {
                    const item = childSnapshot.val();
                    const itemMonth = item.tanggal.split('-')[1];
                    if (itemMonth === selectedMonth) {
                        dataArray.push({ id: childSnapshot.key, ...item });
                        if (item.tipe === 'in') totalIn += item.jumlah;
                        else totalOut += item.jumlah;
                    }
                });

                totalInElem.innerText = "Rp " + totalIn.toLocaleString();
                totalOutElem.innerText = "Rp " + totalOut.toLocaleString();

                dataArray.reverse().forEach((item) => {
                    const color = item.tipe === 'in' ? 'text-green-400' : 'text-red-400';
                    const canDelete = (currentUser === "AYAH" || currentUser === item.penginput);
                    const row = `
                        <tr class="hover:bg-slate-800/50 transition">
                            <td class="p-3 text-[10px] text-slate-400">${item.tanggal}</td>
                            <td class="p-3 font-bold text-blue-300 text-xs">${item.penginput}</td>
                            <td class="p-3 text-xs">${item.keterangan}</td>
                            <td class="p-3 font-bold ${color} text-right">Rp ${item.jumlah.toLocaleString()}</td>
                            <td class="p-3 text-center">
                                ${canDelete ? `<button onclick="deleteData('${item.id}', '${item.penginput}')" class="text-red-500 hover:text-red-300">✕</button>` : `<span class="text-slate-700">🔒</span>`}
                            </td>
                        </tr>
                    `;
                    reportBody.innerHTML += row;
                });
            });
        }
    </script>
</body>
</html>
