<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Keluarga Aan</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-soft {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .music-active { animation: pulse-soft 2s infinite; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .gradient-card {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        .game-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- Musik Latar -->
    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="toggleMusic()" id="music-btn" class="bg-white p-4 rounded-full shadow-2xl border border-slate-200 hover:shadow-blue-200 transition-all">
            <span id="music-icon" class="text-2xl">🎵</span>
        </button>
        <audio id="bg-music" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Halaman Login -->
    <div id="login-page" class="max-w-md mx-auto p-6 pt-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">💰</span>
                </div>
                <h1 class="text-2xl font-black text-slate-800">Keluarga Aan</h1>
                <p class="text-slate-500 text-sm">Kelola masa depan dengan ceria</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">Siapa ini?</label>
                    <select id="user-login" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700">
                        <option value="AYAH">AYAH</option>
                        <option value="BUNDA">BUNDA</option>
                        <option value="AA GIBRAN">AA GIBRAN</option>
                        <option value="KAKAK FIYA">KAKAK FIYA</option>
                        <option value="ABANG RAYSHAKA">ABANG RAYSHAKA</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">PIN Rahasia</label>
                    <input type="password" id="pass-login" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg transition-all active:scale-95">MASUK SEKARANG</button>
            </div>
        </div>
    </div>

    <!-- Halaman Utama (Main Page) -->
    <div id="main-page" class="max-w-2xl mx-auto p-4 hidden space-y-6 pb-24">
        <!-- Header Profil -->
        <div class="flex justify-between items-center glass-effect p-4 rounded-2xl sticky top-4 z-40 shadow-sm border border-white">
            <div class="flex items-center gap-3">
                <img id="user-avatar" src="" class="w-14 h-14 rounded-full border-4 border-white object-cover shadow-md bg-slate-100 ring-1 ring-blue-100">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Halo,</p>
                    <h2 class="text-xl font-black text-slate-800" id="display-user"></h2>
                </div>
            </div>
            <div class="text-right bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">Saldo Saya</p>
                <p class="text-base font-black text-blue-700" id="my-personal-balance">Rp 0</p>
            </div>
        </div>

        <!-- Dashboard Khusus Ayah -->
        <div id="family-balance-card" class="hidden gradient-card p-8 rounded-[2rem] shadow-xl shadow-blue-200 text-white relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-blue-100 text-sm font-medium opacity-80">Total Kas Keluarga Bulan Ini</p>
                <h1 class="text-4xl font-black mt-1" id="total-balance">Rp 0</h1>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
            <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2">
                <span class="bg-blue-100 p-1.5 rounded-lg">➕</span> Catat Transaksi
            </h3>
            <div class="space-y-4">
                <input type="text" id="desc" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Keterangan">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="amount" class="bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Jumlah (Rp)">
                    <select id="type" class="bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-blue-600">
                        <option value="in">MASUK (+)</option>
                        <option value="out">KELUAR (-)</option>
                    </select>
                </div>
                <input type="date" id="date" class="w-full bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="saveData()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all active:scale-95 shadow-lg">SIMPAN</button>
            </div>
        </div>

        <div id="dashboard-ayah" class="hidden">
            <div class="bg-slate-900 rounded-3xl p-6 text-white">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-yellow-400 uppercase text-xs tracking-widest">Kontrol Manajer Ayah</h3>
                    <select id="filter-month" onchange="loadReport()" class="bg-slate-800 text-xs p-2 rounded-lg border-0 outline-none">
                        <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
                        <option value="04">Apr</option><option value="05">Mei</option><option value="06">Jun</option>
                        <option value="07">Jul</option><option value="08">Agu</option><option value="09">Sep</option>
                        <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                    </select>
                </div>
                <div id="user-summaries" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <h3 class="text-sm font-black text-slate-800 flex items-center gap-2">
                        <span class="bg-yellow-100 p-1.5 rounded-lg">🕒</span> Riwayat
                    </h3>
                    <button onclick="openGameMenu()" class="text-[10px] font-black text-white bg-indigo-500 px-3 py-1.5 rounded-xl hover:bg-indigo-600 transition-all flex items-center gap-1.5 shadow-sm active:scale-95">
                        <span>🎮</span> MAIN GAME
                    </button>
                </div>
                <button onclick="location.reload()" class="text-[10px] font-bold text-red-400 uppercase">Logout</button>
            </div>
            <div id="transaction-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- MODAL DASHBOARD GAME -->
    <div id="game-dashboard" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeGameMenu()"></div>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 relative z-10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Game Edukasi 🚀</h2>
                <button onclick="closeGameMenu()" class="bg-slate-100 text-slate-400 hover:text-red-500 p-2 rounded-full font-bold text-sm">✕</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="startGame('IPA')" class="bg-green-50 p-6 rounded-3xl border-2 border-green-100 hover:border-green-500 cursor-pointer text-center group transition-all">
                    <span class="text-4xl block mb-2 group-hover:scale-110 transition-transform">🧬</span>
                    <p class="font-black text-green-700 text-sm">IPA</p>
                </div>
                <div onclick="startGame('IPS')" class="bg-orange-50 p-6 rounded-3xl border-2 border-orange-100 hover:border-orange-500 cursor-pointer text-center group transition-all">
                    <span class="text-4xl block mb-2 group-hover:scale-110 transition-transform">🌍</span>
                    <p class="font-black text-orange-700 text-sm">IPS</p>
                </div>
                <div onclick="startGame('SEJARAH')" class="bg-red-50 p-6 rounded-3xl border-2 border-red-100 hover:border-red-500 cursor-pointer text-center group transition-all">
                    <span class="text-4xl block mb-2 group-hover:scale-110 transition-transform">📜</span>
                    <p class="font-black text-red-700 text-sm">SEJARAH</p>
                </div>
                <div onclick="startGame('MTK')" class="bg-blue-50 p-6 rounded-3xl border-2 border-blue-100 hover:border-blue-500 cursor-pointer text-center group transition-all">
                    <span class="text-4xl block mb-2 group-hover:scale-110 transition-transform">🔢</span>
                    <p class="font-black text-blue-700 text-sm">MTK</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PLAYING GAME -->
    <div id="game-play-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <span id="game-title-active" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-black">GAME</span>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Skor</p>
                    <p id="game-score" class="text-lg font-black text-blue-600">0</p>
                </div>
            </div>
            
            <!-- Area Pertanyaan -->
            <div id="question-container" class="text-center py-8">
                <h3 id="question-text" class="text-xl font-bold text-slate-800 leading-relaxed mb-6">Memuat pertanyaan...</h3>
                <div id="options-grid" class="grid grid-cols-1 gap-3">
                    <!-- Tombol pilihan akan muncul di sini -->
                </div>
                <!-- Input Khusus MTK -->
                <div id="mtk-input-area" class="hidden">
                    <input type="number" id="mtk-answer" class="w-full bg-slate-100 p-4 rounded-2xl text-center text-2xl font-black outline-none focus:ring-4 focus:ring-blue-300" placeholder="?">
                    <button onclick="checkMtkAnswer()" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-bold">JAWAB</button>
                </div>
            </div>

            <p id="game-feedback" class="text-center mt-4 font-bold h-6"></p>
            <button onclick="closeGamePlay()" class="w-full mt-6 text-slate-400 font-bold text-sm uppercase tracking-widest">Berhenti</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDpkVNmfyqx76jfZV0T9N0pye4Q0p9G2lk",
            authDomain: "tabungankeluarga-a091f.firebaseapp.com",
            projectId: "tabungankeluarga-a091f",
            databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        const userPhotos = { 
            "AYAH": "https://lh3.googleusercontent.com/d/1nKJm--C0x-vjHRWSD62uqo90z7BmKslQ", 
            "BUNDA": "https://lh3.googleusercontent.com/d/1fBTI_GFN8RfRh-tkW_lquFcRW6LmPJvX", 
            "AA GIBRAN": "https://lh3.googleusercontent.com/d/1qCEjjab6-KTNXOqtFuqnlCZqIr4O67gU", 
            "KAKAK FIYA": "https://lh3.googleusercontent.com/d/1HA9c4C74aqR9xzNWehe3QnLxfI8K6xX_", 
            "ABANG RAYSHAKA": "https://lh3.googleusercontent.com/d/1lHhVvzppvtiAzEv4aq20t1BudqEdUl2N" 
        };
        const userPasswords = { "AYAH": "ayah", "BUNDA": "bunda", "AA GIBRAN": "gibran", "KAKAK FIYA": "fiya", "ABANG RAYSHAKA": "abang" };

        // DATA GAME
        const quizData = {
            IPA: [
                { q: "Apa pusat tata surya kita?", a: "Matahari", o: ["Bumi", "Matahari", "Bulan", "Mars"] },
                { q: "Hewan yang memakan tumbuhan disebut?", a: "Herbivora", o: ["Karnivora", "Omnivora", "Herbivora", "Spora"] },
                { q: "Benda yang ditarik magnet biasanya terbuat dari?", a: "Besi", o: ["Kayu", "Plastik", "Kaca", "Besi"] },
                { q: "Proses tumbuhan memasak makanan disebut?", a: "Fotosintesis", o: ["Oksidasi", "Fotosintesis", "Respirasi", "Erosi"] },
                { q: "Perubahan benda dari gas menjadi cair disebut?", a: "Mengembun", o: ["Membeku", "Menguap", "Mengembun", "Menyublim"] }
            ],
            IPS: [
                { q: "Apa nama ibu kota Indonesia saat ini?", a: "Jakarta", o: ["Surabaya", "Bandung", "Jakarta", "IKN"] },
                { q: "Indonesia terletak di antara dua benua, yaitu?", a: "Asia dan Australia", o: ["Asia dan Eropa", "Asia dan Australia", "Afrika dan Asia", "Amerika dan Asia"] },
                { q: "Alat tukar yang sah di negara kita adalah?", a: "Rupiah", o: ["Dollar", "Yen", "Rupiah", "Ringgit"] },
                { q: "Gunung tertinggi di pulau Jawa adalah?", a: "Semeru", o: ["Merapi", "Semeru", "Slamet", "Bromo"] },
                { q: "Berapakah jumlah provinsi di Indonesia saat ini?", a: "38", o: ["34", "36", "37", "38"] }
            ],
            SEJARAH: [
                { q: "Siapakah Bapak Proklamator Indonesia?", a: "Ir. Soekarno", o: ["Moh. Hatta", "Ir. Soekarno", "Soeharto", "Ki Hajar Dewantara"] },
                { q: "Kapan Indonesia merdeka?", a: "17 Agustus 1945", o: ["17 Agustus 1945", "20 Mei 1908", "28 Oktober 1928", "1 Juni 1945"] },
                { q: "Sumpah Pemuda terjadi pada tanggal?", a: "28 Oktober", o: ["17 Agustus", "20 Mei", "28 Oktober", "10 November"] },
                { q: "Candi Borobudur terletak di provinsi?", a: "Jawa Tengah", o: ["Jawa Timur", "Jawa Tengah", "Yogyakarta", "Bali"] },
                { q: "Siapa penemu benua Amerika?", a: "Christopher Columbus", o: ["Marco Polo", "Christopher Columbus", "Vasco da Gama", "Magelhaens"] }
            ]
        };

        // LOGIKA GAME DINAMIS
        let gameScore = 0;
        let currentGameType = "";
        let mtkCorrectAnswer = 0;

        function openGameMenu() { document.getElementById('game-dashboard').classList.remove('hidden'); }
        function closeGameMenu() { document.getElementById('game-dashboard').classList.add('hidden'); }

        function startGame(type) {
            currentGameType = type;
            gameScore = 0;
            closeGameMenu();
            document.getElementById('game-play-modal').classList.remove('hidden');
            document.getElementById('game-title-active').innerText = type;
            document.getElementById('game-score').innerText = "0";
            nextQuestion();
        }

        function closeGamePlay() {
            document.getElementById('game-play-modal').classList.add('hidden');
        }

        function nextQuestion() {
            const feedback = document.getElementById('game-feedback');
            feedback.innerText = "";
            const optionsGrid = document.getElementById('options-grid');
            const questionText = document.getElementById('question-text');
            const mtkArea = document.getElementById('mtk-input-area');
            
            optionsGrid.innerHTML = "";
            mtkArea.classList.add('hidden');

            if (currentGameType === 'MTK') {
                mtkArea.classList.remove('hidden');
                generateMtk();
            } else {
                const questions = quizData[currentGameType];
                const randomQ = questions[Math.floor(Math.random() * questions.length)];
                questionText.innerText = randomQ.q;
                
                randomQ.o.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold hover:bg-blue-50 hover:border-blue-500 transition-all text-slate-700";
                    btn.innerText = opt;
                    btn.onclick = () => checkQuizAnswer(opt, randomQ.a);
                    optionsGrid.appendChild(btn);
                });
            }
        }

        function generateMtk() {
            const level = Math.floor(gameScore / 30) + 1; // Level naik tiap skor 30
            let n1, n2, op;
            
            if (level === 1) { // Tambah Kurang Sederhana
                n1 = Math.floor(Math.random() * 10) + 1;
                n2 = Math.floor(Math.random() * 10) + 1;
                op = Math.random() > 0.5 ? '+' : '-';
            } else if (level === 2) { // Angka Puluhan
                n1 = Math.floor(Math.random() * 50) + 10;
                n2 = Math.floor(Math.random() * 50) + 10;
                op = Math.random() > 0.5 ? '+' : '-';
            } else { // Perkalian Dasar
                n1 = Math.floor(Math.random() * 10) + 2;
                n2 = Math.floor(Math.random() * 10) + 2;
                op = 'x';
            }

            if (op === '+') mtkCorrectAnswer = n1 + n2;
            else if (op === '-') {
                if (n1 < n2) [n1, n2] = [n2, n1]; // Hindari hasil negatif
                mtkCorrectAnswer = n1 - n2;
            } else mtkCorrectAnswer = n1 * n2;

            document.getElementById('question-text').innerHTML = `<span class="text-xs text-slate-400 block uppercase">Level ${level}</span> ${n1} ${op} ${n2} = ?`;
            document.getElementById('mtk-answer').value = "";
            document.getElementById('mtk-answer').focus();
        }

        function checkQuizAnswer(userAns, correct) {
            const feedback = document.getElementById('game-feedback');
            if (userAns === correct) {
                gameScore += 10;
                feedback.innerText = "✅ Betul! (+10)";
                feedback.className = "text-center mt-4 font-bold text-green-500";
                updateScoreDisplay();
                setTimeout(nextQuestion, 1000);
            } else {
                feedback.innerText = "❌ Salah, coba lagi!";
                feedback.className = "text-center mt-4 font-bold text-red-500";
            }
        }

        function checkMtkAnswer() {
            const userAns = parseInt(document.getElementById('mtk-answer').value);
            const feedback = document.getElementById('game-feedback');
            if (userAns === mtkCorrectAnswer) {
                gameScore += 10;
                feedback.innerText = "⭐ Keren! (+10)";
                feedback.className = "text-center mt-4 font-bold text-blue-500";
                updateScoreDisplay();
                setTimeout(nextQuestion, 1000);
            } else {
                feedback.innerText = "❌ Masih salah...";
                feedback.className = "text-center mt-4 font-bold text-red-400";
            }
        }

        function updateScoreDisplay() {
            document.getElementById('game-score').innerText = gameScore;
        }

        // LOGIKA CORE (Login, Save, Load) - Tetap sama
        function login() {
            const user = document.getElementById('user-login').value;
            const pass = document.getElementById('pass-login').value;
            if (userPasswords[user] === pass) {
                currentUser = user;
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                document.getElementById('display-user').innerText = currentUser;
                document.getElementById('user-avatar').src = userPhotos[currentUser];
                document.getElementById('date').valueAsDate = new Date();
                document.getElementById('filter-month').value = String(new Date().getMonth() + 1).padStart(2, '0');
                if(currentUser === "AYAH") {
                    document.getElementById('dashboard-ayah').classList.remove('hidden');
                    document.getElementById('family-balance-card').classList.remove('hidden');
                }
                loadReport();
                toggleMusic();
            } else { alert("❌ PIN Salah!"); }
        }

        function saveData() {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;
            if (desc && amount && date) {
                db.ref('transaksi').push({ penginput: currentUser, keterangan: desc, jumlah: parseInt(amount), tipe: type, tanggal: date, waktu: Date.now() });
                document.getElementById('desc').value = ""; document.getElementById('amount').value = "";
            }
        }

        function loadReport() {
            const selectedMonth = document.getElementById('filter-month').value;
            db.ref('transaksi').on('value', (snapshot) => {
                const listDiv = document.getElementById('transaction-list');
                const summaryDiv = document.getElementById('user-summaries');
                listDiv.innerHTML = ""; if(summaryDiv) summaryDiv.innerHTML = "";
                let netBalance = 0; let myPersonalNet = 0; let dataArray = []; let userTotals = {};

                snapshot.forEach((child) => {
                    const item = child.val();
                    if (item.penginput === currentUser) myPersonalNet += (item.tipe === 'in' ? item.jumlah : -item.jumlah);
                    if (item.tanggal.split('-')[1] === selectedMonth) {
                        dataArray.push({ id: child.key, ...item });
                        if (!userTotals[item.penginput]) userTotals[item.penginput] = { in: 0, out: 0 };
                        if (item.tipe === 'in') { userTotals[item.penginput].in += item.jumlah; netBalance += item.jumlah; }
                        else { userTotals[item.penginput].out += item.jumlah; netBalance -= item.jumlah; }
                    }
                });

                document.getElementById('total-balance').innerText = `Rp ${netBalance.toLocaleString()}`;
                document.getElementById('my-personal-balance').innerText = `Rp ${myPersonalNet.toLocaleString()}`;

                if(currentUser === "AYAH" && summaryDiv) {
                    for (const user in userTotals) {
                        summaryDiv.innerHTML += `<div class="bg-slate-800 p-3 rounded-2xl border border-slate-700">
                            <p class="text-[10px] font-bold text-blue-300 mb-1 uppercase">${user}</p>
                            <p class="text-white text-[11px] font-black">Net: ${(userTotals[user].in - userTotals[user].out).toLocaleString()}</p>
                        </div>`;
                    }
                }

                dataArray.sort((a,b) => b.waktu - a.waktu).forEach(item => {
                    const isInc = item.tipe === 'in';
                    listDiv.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div><p class="text-sm font-bold text-slate-800">${item.keterangan}</p><p class="text-[10px] text-slate-400 font-black uppercase">${item.penginput} • ${item.tanggal}</p></div>
                        <p class="font-black ${isInc ? 'text-green-600' : 'text-red-600'}">${isInc ? '+' : '-'} Rp ${item.jumlah.toLocaleString()}</p>
                    </div>`;
                });
            });
        }

        const audio = document.getElementById('bg-music'); let isPlaying = false;
        function toggleMusic() {
            if (isPlaying) { audio.pause(); document.getElementById('music-icon').innerText = "🎵"; }
            else { audio.play().catch(() => {}); document.getElementById('music-icon').innerText = "⏸️"; }
            isPlaying = !isPlaying; document.getElementById('music-btn').classList.toggle('music-active');
        }
    </script>
</body>
</html>
