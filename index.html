<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Keluarga Aan</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-soft { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .music-active { animation: pulse-soft 2s infinite; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .gradient-card { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- Musik Latar & Pemilih Lagu -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2">
        <select id="song-selector" onchange="changeSong()" class="text-[10px] bg-white/80 backdrop-blur border border-slate-200 rounded-lg p-1 shadow-sm outline-none">
            <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">🎵 Musik Ceria (Game)</option>
            <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">☕ Musik Santai (Lofi)</option>
            <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">⚡ Musik Semangat</option>
        </select>
        <button onclick="toggleMusic()" id="music-btn" class="bg-white p-4 rounded-full shadow-2xl border border-slate-200 hover:shadow-blue-200 transition-all">
            <span id="music-icon" class="text-2xl">🎵</span>
        </button>
        <audio id="bg-music" loop><source id="music-source" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
    </div>

    <!-- Halaman Login -->
    <div id="login-page" class="max-w-md mx-auto p-6 pt-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
            <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><span class="text-3xl">💰</span></div>
            <h1 class="text-2xl font-black text-slate-800">Keluarga Aan</h1>
            <div class="space-y-4 mt-8">
                <select id="user-login" class="w-full bg-slate-50 border-0 p-4 rounded-2xl font-bold text-slate-700">
                    <option value="AYAH">AYAH</option>
                    <option value="BUNDA">BUNDA</option>
                    <option value="AA GIBRAN">AA GIBRAN</option>
                    <option value="KAKAK FIYA">KAKAK FIYA</option>
                    <option value="ABANG RAYSHAKA">ABANG RAYSHAKA</option>
                </select>
                <input type="password" id="pass-login" class="w-full bg-slate-50 border-0 p-4 rounded-2xl outline-none" placeholder="PIN Rahasia">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg transition-all active:scale-95">MASUK</button>
            </div>
        </div>
    </div>

    <!-- Halaman Utama -->
    <div id="main-page" class="max-w-2xl mx-auto p-4 hidden space-y-6 pb-24">
        <!-- Header -->
        <div class="flex justify-between items-center glass-effect p-4 rounded-2xl sticky top-4 z-40 shadow-sm border border-white">
            <div class="flex items-center gap-3">
                <img id="user-avatar" src="" class="w-14 h-14 rounded-full border-4 border-white object-cover shadow-md bg-slate-100">
                <div>
                    <div class="flex items-center gap-2">
                        <h2 class="text-xl font-black text-slate-800" id="display-user"></h2>
                        <button onclick="logout()" class="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold hover:bg-red-600 hover:text-white transition-all">KELUAR</button>
                    </div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Aktivitas Hari Ini</p>
                </div>
            </div>
            <div class="text-right bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100">
                <p class="text-[10px] font-black text-blue-400 uppercase">Saldo Saya</p>
                <p class="text-base font-black text-blue-700" id="my-personal-balance">Rp 0</p>
            </div>
        </div>

        <!-- Dashboard Ayah (Total Kas) -->
        <div id="family-balance-card" class="hidden gradient-card p-8 rounded-[2rem] shadow-xl text-white">
            <p class="text-blue-100 text-sm opacity-80">Total Kas Keluarga</p>
            <h1 class="text-4xl font-black mt-1" id="total-balance">Rp 0</h1>
        </div>

        <!-- Form Transaksi -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
            <h3 class="text-sm font-black text-slate-800 mb-4 flex items-center gap-2"><span>➕</span> Transaksi Baru</h3>
            <div class="space-y-4">
                <input type="text" id="desc" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" placeholder="Keterangan">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="amount" class="bg-slate-50 p-4 rounded-2xl outline-none font-bold" placeholder="Jumlah (Rp)">
                    <select id="type" class="bg-slate-50 p-4 rounded-2xl font-bold text-blue-600">
                        <option value="in">MASUK (+)</option>
                        <option value="out">KELUAR (-)</option>
                    </select>
                </div>
                <input type="date" id="date" class="w-full bg-slate-50 p-4 rounded-2xl outline-none">
                <button onclick="saveData()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg">SIMPAN DATA</button>
            </div>
        </div>

        <!-- Tombol Game -->
        <div class="flex justify-between items-center px-2">
            <h3 class="text-sm font-black text-slate-800">Riwayat & Aktivitas</h3>
            <button onclick="openGameMenu()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-black text-xs flex items-center gap-2 animate-bounce">
                🎮 MAIN GAME SERU
            </button>
        </div>

        <div id="transaction-list" class="space-y-3"></div>
    </div>

    <!-- MODAL GAME & MODAL PLAYING (Tetap Sama) -->
    <div id="game-dashboard" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeGameMenu()"></div>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 relative z-10 text-center">
            <h2 class="text-2xl font-black mb-6">Pilih Tantangan 🚀</h2>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="startGame('IPA')" class="bg-green-50 p-6 rounded-3xl text-center cursor-pointer hover:border-green-500 border-2 border-transparent">
                    <span class="text-4xl block mb-2">🧬</span><p class="font-black text-green-700">IPA</p>
                </div>
                <div onclick="startGame('IPS')" class="bg-orange-50 p-6 rounded-3xl text-center cursor-pointer hover:border-orange-500 border-2 border-transparent">
                    <span class="text-4xl block mb-2">🌍</span><p class="font-black text-orange-700">IPS</p>
                </div>
                <div onclick="startGame('SEJARAH')" class="bg-red-50 p-6 rounded-3xl text-center cursor-pointer hover:border-red-500 border-2 border-transparent">
                    <span class="text-4xl block mb-2">📜</span><p class="font-black text-red-700">SEJARAH</p>
                </div>
                <div onclick="startGame('MTK')" class="bg-blue-50 p-6 rounded-3xl text-center cursor-pointer hover:border-blue-500 border-2 border-transparent">
                    <span class="text-4xl block mb-2">🔢</span><p class="font-black text-blue-700">MTK</p>
                </div>
            </div>
        </div>
    </div>

    <div id="game-play-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm"></div>
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10">
            <div class="flex justify-between mb-6">
                <span id="game-title-active" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-black">GAME</span>
                <p id="game-score" class="text-lg font-black text-blue-600">0</p>
            </div>
            <div id="question-container" class="text-center py-4">
                <h3 id="question-text" class="text-xl font-bold mb-6 text-slate-800"></h3>
                <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
                <div id="mtk-input-area" class="hidden">
                    <input type="number" id="mtk-answer" class="w-full bg-slate-100 p-4 rounded-2xl text-center text-2xl font-black outline-none" placeholder="?">
                    <button onclick="checkMtkAnswer()" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-bold">JAWAB</button>
                </div>
            </div>
            <p id="game-feedback" class="text-center mt-4 font-bold h-6"></p>
            <button onclick="closeGamePlay()" class="w-full mt-6 text-slate-400 font-bold text-xs uppercase">Berhenti</button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Gunakan Milik Bapak)
        const firebaseConfig = {
            apiKey: "AIzaSyDpkVNmfyqx76jfZV0T9N0pye4Q0p9G2lk",
            authDomain: "tabungankeluarga-a091f.firebaseapp.com",
            projectId: "tabungankeluarga-a091f",
            databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        const userPhotos = { 
            "AYAH": "https://lh3.googleusercontent.com/d/1nKJm--C0x-vjHRWSD62uqo90z7BmKslQ", 
            "BUNDA": "https://lh3.googleusercontent.com/d/1fBTI_GFN8RfRh-tkW_lquFcRW6LmPJvX", 
            "AA GIBRAN": "https://lh3.googleusercontent.com/d/1qCEjjab6-KTNXOqtFuqnlCZqIr4O67gU", 
            "KAKAK FIYA": "https://lh3.googleusercontent.com/d/1HA9c4C74aqR9xzNWehe3QnLxfI8K6xX_", 
            "ABANG RAYSHAKA": "https://lh3.googleusercontent.com/d/1lHhVvzppvtiAzEv4aq20t1BudqEdUl2N" 
        };
        const userPasswords = { "AYAH": "ayah", "BUNDA": "bunda", "AA GIBRAN": "gibran", "KAKAK FIYA": "fiya", "ABANG RAYSHAKA": "abang" };

        const quizData = {
            IPA: [
                { q: "Apa pusat tata surya kita?", a: "Matahari", o: ["Bumi", "Matahari", "Bulan", "Mars"] },
                { q: "Hewan pemakan tumbuhan disebut?", a: "Herbivora", o: ["Karnivora", "Omnivora", "Herbivora", "Spora"] },
                { q: "Planet Merah adalah?", a: "Mars", o: ["Venus", "Mars", "Jupiter", "Saturnus"] },
                { q: "Tumbuhan bernapas menghirup?", a: "Oksigen", o: ["Oksigen", "Karbon", "Nitrogen", "Argon"] }
            ],
            IPS: [
                { q: "Ibu kota Indonesia?", a: "Jakarta", o: ["Surabaya", "Bandung", "Jakarta", "IKN"] },
                { q: "Mata uang Indonesia?", a: "Rupiah", o: ["Dollar", "Yen", "Rupiah", "Ringgit"] },
                { q: "Pulau terbesar di Indonesia?", a: "Kalimantan", o: ["Jawa", "Bali", "Kalimantan", "Sulawesi"] }
            ],
            SEJARAH: [
                { q: "Siapa Bapak Proklamator?", a: "Ir. Soekarno", o: ["Moh. Hatta", "Ir. Soekarno", "Soeharto", "Ki Hajar Dewantara"] },
                { q: "Kapan Indonesia merdeka?", a: "1945", o: ["1942", "1945", "1950", "1960"] }
            ]
        };

        let gameScore = 0;
        let currentGameType = "";
        let mtkCorrectAnswer = 0;

        // FUNGSI CORE
        function login() {
            const user = document.getElementById('user-login').value;
            const pass = document.getElementById('pass-login').value;
            if (userPasswords[user] === pass) {
                currentUser = user;
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                document.getElementById('display-user').innerText = currentUser;
                document.getElementById('user-avatar').src = userPhotos[currentUser];
                document.getElementById('date').valueAsDate = new Date();
                if(currentUser === "AYAH") document.getElementById('family-balance-card').classList.remove('hidden');
                loadReport();
                toggleMusic();
            } else { alert("PIN Salah!"); }
        }

        function logout() {
            if(confirm("Keluar dari akun?")) {
                currentUser = "";
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
                document.getElementById('family-balance-card').classList.add('hidden');
                document.getElementById('pass-login').value = "";
                if(isPlaying) toggleMusic(); 
            }
        }

        function saveData() {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;
            if (desc && amount && date) {
                db.ref('transaksi').push({ penginput: currentUser, keterangan: desc, jumlah: parseInt(amount), tipe: type, tanggal: date, waktu: Date.now() });
                document.getElementById('desc').value = ""; document.getElementById('amount').value = "";
            }
        }

        function deleteTransaction(id) {
            if (confirm("Hapus transaksi ini?")) {
                db.ref('transaksi/' + id).remove();
            }
        }

        function loadReport() {
            db.ref('transaksi').on('value', (snapshot) => {
                const listDiv = document.getElementById('transaction-list');
                listDiv.innerHTML = "";
                let netBalance = 0; let myPersonal = 0;
                let data = [];
                snapshot.forEach((child) => {
                    const item = child.val();
                    const key = child.key;
                    data.push({...item, id: key});
                    if (item.tipe === 'in') netBalance += item.jumlah; else netBalance -= item.jumlah;
                    if (item.penginput === currentUser) { if(item.tipe === 'in') myPersonal += item.jumlah; else myPersonal -= item.jumlah; }
                });
                document.getElementById('total-balance').innerText = `Rp ${netBalance.toLocaleString()}`;
                document.getElementById('my-personal-balance').innerText = `Rp ${myPersonal.toLocaleString()}`;
                
                data.sort((a,b)=>b.waktu-a.waktu).forEach(item => {
                    const isInc = item.tipe === 'in';
                    const canDelete = (currentUser === "AYAH" || item.penginput === currentUser);
                    listDiv.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div class="flex-1">
                            <p class="text-sm font-bold">${item.keterangan}</p>
                            <p class="text-[10px] text-slate-400 uppercase">${item.penginput} • ${item.tanggal}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <p class="font-black ${isInc ? 'text-green-600' : 'text-red-600'}">${isInc ? '+' : '-'} Rp ${item.jumlah.toLocaleString()}</p>
                            ${canDelete ? `<button onclick="deleteTransaction('${item.id}')" class="text-xs bg-red-50 text-red-500 p-2 rounded-lg">🗑️</button>` : ''}
                        </div>
                    </div>`;
                });
            });
        }

        // FUNGSI GAME & MUSIK (Tetap Sama)
        function openGameMenu() { document.getElementById('game-dashboard').classList.remove('hidden'); }
        function closeGameMenu() { document.getElementById('game-dashboard').classList.add('hidden'); }
        function closeGamePlay() { document.getElementById('game-play-modal').classList.add('hidden'); }
        function startGame(type) { currentGameType = type; gameScore = 0; closeGameMenu(); document.getElementById('game-play-modal').classList.remove('hidden'); document.getElementById('game-title-active').innerText = type; nextQuestion(); }
        
        function nextQuestion() {
            document.getElementById('game-feedback').innerText = "";
            const optionsGrid = document.getElementById('options-grid');
            const questionText = document.getElementById('question-text');
            const mtkArea = document.getElementById('mtk-input-area');
            optionsGrid.innerHTML = ""; mtkArea.classList.add('hidden');
            if (currentGameType === 'MTK') { mtkArea.classList.remove('hidden'); generateMtk(); } 
            else {
                const list = quizData[currentGameType];
                const q = list[Math.floor(Math.random() * list.length)];
                questionText.innerText = q.q;
                q.o.forEach(opt => {
                    const btn = document.createElement('button'); btn.className = "w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold hover:bg-blue-50"; btn.innerText = opt;
                    btn.onclick = () => { if(opt === q.a) { gameScore += 10; updateScore(); nextQuestion(); } else { document.getElementById('game-feedback').innerText = "❌ SALAH"; }};
                    optionsGrid.appendChild(btn);
                });
            }
        }

        function generateMtk() {
            const n1 = Math.floor(Math.random()*10)+1; const n2 = Math.floor(Math.random()*10)+1;
            mtkCorrectAnswer = n1 + n2;
            document.getElementById('question-text').innerText = `${n1} + ${n2} = ?`;
            document.getElementById('mtk-answer').value = "";
        }

        function checkMtkAnswer() {
            const user = parseInt(document.getElementById('mtk-answer').value);
            if(user === mtkCorrectAnswer) { gameScore += 10; updateScore(); nextQuestion(); }
            else { document.getElementById('game-feedback').innerText = "❌ SALAH"; }
        }

        function updateScore() { document.getElementById('game-score').innerText = gameScore; }

        const audio = document.getElementById('bg-music');
        let isPlaying = false;
        function toggleMusic() {
            if (isPlaying) { audio.pause(); document.getElementById('music-icon').innerText = "🎵"; }
            else { audio.play().catch(()=>{}); document.getElementById('music-icon').innerText = "⏸️"; }
            isPlaying = !isPlaying; document.getElementById('music-btn').classList.toggle('music-active');
        }
        function changeSong() { const newSrc = document.getElementById('song-selector').value; document.getElementById('music-source').src = newSrc; audio.load(); if(isPlaying) audio.play(); }
    </script>
</body>
</html>
