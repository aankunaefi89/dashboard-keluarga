<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Keluarga Aan</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="login-page" class="max-w-md mx-auto p-6 mt-20">
        <div class="bg-white rounded-2xl shadow-2xl p-8 border-t-8 border-blue-600">
            <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-8">🔐 Log In</h1>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Pilih Anggota:</label>
                    <select id="user-login" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none">
                        <option value="AYAH">AYAH</option>
                        <option value="BUNDA">BUNDA</option>
                        <option value="AA GIBRAN">AA GIBRAN</option>
                        <option value="KAKAK FIYA">KAKAK FIYA</option>
                        <option value="ABANG RAYSHAKA">ABANG RAYSHAKA</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Password:</label>
                    <input type="password" id="pass-login" class="w-full border-2 p-3 rounded-xl focus:border-blue-500 outline-none" placeholder="Masukkan password">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg transition">MASUK</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="max-w-4xl mx-auto p-4 hidden space-y-6">
        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-md border-l-4 border-blue-500">
            <h2 class="text-xl font-bold">Halo, <span id="display-user" class="text-blue-600"></span>!</h2>
            <button onclick="location.reload()" class="bg-red-100 text-red-600 px-4 py-1 rounded-lg font-bold hover:bg-red-600 hover:text-white transition">Keluar</button>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6">
            <h3 class="text-lg font-bold mb-4 flex items-center">📝 Input Transaksi</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="desc" class="border-2 p-3 rounded-lg outline-none focus:border-blue-400" placeholder="Keterangan (Contoh: Sisa Jajan)">
                <input type="number" id="amount" class="border-2 p-3 rounded-lg outline-none focus:border-blue-400" placeholder="Jumlah Nominal (Rp)">
                <input type="date" id="date" class="border-2 p-3 rounded-lg outline-none focus:border-blue-400">
                <select id="type" class="border-2 p-3 rounded-lg outline-none focus:border-blue-400">
                    <option value="in">PEMASUKAN (+)</option>
                    <option value="out">PENGELUARAN (-)</option>
                </select>
                <button onclick="saveData()" class="md:col-span-2 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 shadow-md">SIMPAN DATA</button>
            </div>
        </div>

        <div id="dashboard-ayah" class="hidden space-y-6">
            <div class="bg-slate-900 rounded-2xl shadow-xl p-6 text-white">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-yellow-400">📊 Laporan Bulanan Ayah</h2>
                    <select id="filter-month" onchange="loadReport()" class="bg-slate-800 text-white p-2 rounded-lg border border-slate-600">
                        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>
                        <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>
                        <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                </div>
                <div id="user-summaries" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
                    </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6">
            <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center">🏆 Urutan Tabungan Terbanyak</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-blue-600 text-white">
                        <tr>
                            <th class="p-3 rounded-tl-lg">Tgl</th>
                            <th class="p-3">Nama</th>
                            <th class="p-3">Ket</th>
                            <th class="p-3 text-right">Jumlah</th>
                            <th class="p-3 text-center rounded-tr-lg">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-data" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDpkVNmfyqx76jfZV0T9N0pye4Q0p9G2lk",
            authDomain: "tabungankeluarga-a091f.firebaseapp.com",
            projectId: "tabungankeluarga-a091f",
            storageBucket: "tabungankeluarga-a091f.firebasestorage.app",
            messagingSenderId: "589724329490",
            appId: "1:589724329490:web:f12cff7a53d9fbe64a1acb",
            measurementId: "G-HL3VLW3CPE",
            databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        const userPasswords = {
            "AYAH": "ayah",
            "BUNDA": "bunda",
            "AA GIBRAN": "gibran",
            "KAKAK FIYA": "fiya",
            "ABANG RAYSHAKA": "abang"
        };

        function login() {
            const user = document.getElementById('user-login').value;
            const pass = document.getElementById('pass-login').value;

            if (userPasswords[user] === pass) {
                currentUser = user;
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                document.getElementById('display-user').innerText = currentUser;
                document.getElementById('date').valueAsDate = new Date();
                const currentMonth = String(new Date().getMonth() + 1).padStart(2, '0');
                document.getElementById('filter-month').value = currentMonth;
                
                if(currentUser === "AYAH") {
                    document.getElementById('dashboard-ayah').classList.remove('hidden');
                }
                loadReport();
            } else {
                alert("Password salah!");
            }
        }

        function saveData() {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;

            if (desc && amount && date) {
                db.ref('transaksi').push({
                    penginput: currentUser,
                    keterangan: desc,
                    jumlah: parseInt(amount),
                    tipe: type,
                    tanggal: date,
                    waktu: Date.now()
                });
                document.getElementById('desc').value = "";
                document.getElementById('amount').value = "";
                alert("Berhasil disimpan!");
            } else {
                alert("Lengkapi semua data!");
            }
        }

        function deleteData(id) {
            if (confirm("Hapus/Koreksi data ini?")) {
                db.ref('transaksi/' + id).remove();
            }
        }

        function loadReport() {
            const selectedMonth = document.getElementById('filter-month').value;
            
            db.ref('transaksi').on('value', (snapshot) => {
                const tableBody = document.getElementById('table-data');
                const summaryDiv = document.getElementById('user-summaries');
                
                tableBody.innerHTML = "";
                if(summaryDiv) summaryDiv.innerHTML = "";

                let dataArray = [];
                let userTotals = {}; // Untuk ringkasan Ayah

                snapshot.forEach((childSnapshot) => {
                    const item = childSnapshot.val();
                    const itemMonth = item.tanggal.split('-')[1];

                    if (itemMonth === selectedMonth) {
                        dataArray.push({ id: childSnapshot.key, ...item });
                        
                        // Hitung total per orang (untuk Ayah)
                        if (!userTotals[item.penginput]) userTotals[item.penginput] = { in: 0, out: 0 };
                        if (item.tipe === 'in') userTotals[item.penginput].in += item.jumlah;
                        else userTotals[item.penginput].out += item.jumlah;
                    }
                });

                // Tampilan Ringkasan Nama untuk Ayah
                if(currentUser === "AYAH") {
                    for (const user in userTotals) {
                        const card = `
                            <div class="bg-slate-800 p-3 rounded-lg border border-slate-700 text-xs">
                                <p class="font-bold text-blue-300 mb-1">${user}</p>
                                <p class="text-green-400">Masuk: ${userTotals[user].in.toLocaleString()}</p>
                                <p class="text-red-400">Keluar: ${userTotals[user].out.toLocaleString()}</p>
                            </div>
                        `;
                        summaryDiv.innerHTML += card;
                    }
                }

                // URUTKAN DARI TERBESAR KE TERKECIL
                dataArray.sort((a, b) => b.jumlah - a.jumlah);

                dataArray.forEach((item) => {
                    const color = item.tipe === 'in' ? 'text-green-600' : 'text-red-600';
                    const row = `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-3 text-[10px] text-gray-400">${item.tanggal}</td>
                            <td class="p-3 font-bold text-gray-700 text-xs">${item.penginput}</td>
                            <td class="p-3 text-xs">${item.keterangan}</td>
                            <td class="p-3 font-bold ${color} text-right">Rp ${item.jumlah.toLocaleString()}</td>
                            <td class="p-3 text-center">
                                <button onclick="deleteData('${item.id}')" class="text-red-500 hover:text-red-700 text-lg">✕</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            });
        }
    </script>
</body>
</html>
